name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Test
        run: go test ./...

      - name: Build release
        run: ./scripts/build-release.sh "$GITHUB_REF_NAME"

      - name: Import GPG key
        env:
          WORDGEN_GPG_PRIVATE_KEY: ${{ secrets.WORDGEN_GPG_PRIVATE_KEY }}
        run: |
          printf '%s' "$WORDGEN_GPG_PRIVATE_KEY" |
            gpg --batch --import

      - name: Sign checksums
        env:
          WORDGEN_GPG_PASSPHRASE: ${{ secrets.WORDGEN_GPG_PASSPHRASE }}
        run: |
          printf '%s' "$WORDGEN_GPG_PASSPHRASE" |
            gpg \
              --batch \
              --yes \
              --pinentry-mode loopback \
              --passphrase-fd 0 \
              --detach-sign \
              --armor \
              dist/SHA512SUMS

          gpg --verify dist/SHA512SUMS.asc dist/SHA512SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/* \
            --verify-tag \
            --generate-notes
